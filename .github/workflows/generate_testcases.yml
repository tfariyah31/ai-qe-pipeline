name: Generate Test Cases

on:
  push:
    paths:
      - 'requirements/**_FEATURES.md'

jobs:
  test-gen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-genai

      - name: Detect changed feature file
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep 'requirements/.*_FEATURES.md' | head -1)
          echo "file=${CHANGED:-requirements/LOGIN_FEATURES.md}" >> $GITHUB_OUTPUT

      - name: Generate Gherkin test cases
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_test_cases.py \
            --input "${{ steps.changed.outputs.file }}"

      - name: Commit generated test cases
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/test_cases/
          git diff --staged --quiet || git commit -m "ci: generate test cases from ${{ steps.changed.outputs.file }}"
          git push

      # ---------------------------------------------------------------
      # Steps below are INTENTIONALLY not automated.
      # Rating (rate_tests.py) requires a Tester's judgment.
      # Run locally: ./scripts/run_pipeline.sh
      # ---------------------------------------------------------------
